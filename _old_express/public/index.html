<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamentos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="theme-switch-checkbox">
            <input type="checkbox" id="theme-switch-checkbox" />
            <span class="slider round"></span>
        </label>
    </div>

    <h1>Gerador de Orçamentos</h1>
    <a href="/lista.html" class="btn-novo">Ver Orçamentos Salvos</a>

    <form id="quoteForm">
        <fieldset style="display: none;">
            </fieldset>

        <fieldset>
            <legend>Dados do Cliente</legend>
            <div class="form-group">
                <label for="clientName">Nome do Cliente:</label>
                <input type="text" id="clientName" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="clientAddress">Endereço:</label>
                    <input type="text" id="clientAddress">
                </div>
                <div class="form-group">
                    <label for="clientPhone">Celular:</label>
                    <input type="text" id="clientPhone">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Detalhes do Orçamento</legend>
            <div class="form-row">
                <div class="form-group">
                    <label for="quoteNumber">Número:</label>
                    <input type="number" id="quoteNumber" required>
                </div>
                <div class="form-group">
                    <label for="quoteDate">Data:</label>
                    <input type="date" id="quoteDate" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="deliveryDate">Previsão de Entrega:</label>
                    <input type="date" id="deliveryDate">
                </div>
                <div class="form-group">
                    <label for="validUntil">Válido Até:</label>
                    <input type="date" id="validUntil">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Itens do Orçamento</legend>
            <div id="itemsContainer"></div>
            <button type="button" id="addItemBtn">Adicionar Item</button>
        </fieldset>
        
        <fieldset>
            <legend>Total</legend>
            <div class="form-group">
                <label for="total">Valor Total do Orçamento:</label>
                <input type="number" id="total" step="0.01" readonly value="0.00">
            </div>
        </fieldset>

        <button type="submit" id="submitBtn">Gerar PDF</button>
    </form>

    <template id="itemTemplate">
        <div class="item">
            <button type="button" class="remove-item">X</button>
            <div class="form-row">
                <div class="form-group">
                    <label>Imagem:</label>
                    <select class="item-image"><option value="">Nenhuma</option></select>
                </div>
                <div class="form-group">
                    <label>Título:</label>
                    <input type="text" class="item-title" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Largura (mm):</label>
                    <input type="number" class="item-width" required>
                </div>
                <div class="form-group">
                    <label>Altura (mm):</label>
                    <input type="number" class="item-height" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Cor do Vidro:</label>
                    <input type="text" class="item-glass" required>
                </div>
                <div class="form-group">
                    <label>Cor do Alumínio:</label>
                    <input type="text" class="item-aluminum" required>
                </div>
                <div class="form-group">
                    <label>Cor das Ferragens:</label>
                    <input type="text" class="item-hardware" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Quantidade:</label>
                    <input type="number" class="item-quantity" value="1" required>
                </div>
                <div class="form-group">
                    <label>Valor Total do Item:</label>
                    <input type="number" class="item-total-price" step="0.01" value="0.00" required>
                </div>
            </div>
        </div>
    </template>

    <script src="/js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const quoteForm = document.getElementById('quoteForm');
            const itemsContainer = document.getElementById('itemsContainer');
            const addItemBtn = document.getElementById('addItemBtn');
            const itemTemplate = document.getElementById('itemTemplate');
            const totalInput = document.getElementById('total');
            const submitBtn = document.getElementById('submitBtn');
            const pageTitle = document.querySelector('h1');

            let editMode = false;
            let quoteId = null;

            const params = new URLSearchParams(window.location.search);
            quoteId = params.get('id');

            const updateTotal = () => {
                let currentTotal = 0;
                document.querySelectorAll('.item .item-total-price').forEach(input => {
                    currentTotal += parseFloat(input.value) || 0;
                });
                totalInput.value = currentTotal.toFixed(2);
            };

            const loadImages = async (selectElement, selectedValue = '') => {
                try {
                    const response = await fetch('/api/images');
                    const images = await response.json();
                    
                    // Limpa opções antigas, exceto a primeira ("Nenhuma")
                    while (selectElement.options.length > 1) {
                        selectElement.remove(1);
                    }

                    images.forEach(image => {
                        const option = document.createElement('option');
                        option.value = image;
                        option.textContent = image;
                        selectElement.appendChild(option);
                    });

                    if (selectedValue) {
                        selectElement.value = selectedValue;
                    }
                } catch (error) {
                    console.error('Erro ao carregar imagens:', error);
                }
            };

            const addItem = async (itemData = null) => {
                const templateContent = itemTemplate.content.cloneNode(true);
                const newItem = templateContent.querySelector('.item');
                const imageSelect = newItem.querySelector('.item-image');
                
                itemsContainer.appendChild(newItem);
                await loadImages(imageSelect, itemData ? itemData.image_filename : '');

                if (itemData) {
                    newItem.querySelector('.item-title').value = itemData.title || '';
                    newItem.querySelector('.item-width').value = itemData.width || '';
                    newItem.querySelector('.item-height').value = itemData.height || '';
                    newItem.querySelector('.item-glass').value = itemData.glass || '';
                    newItem.querySelector('.item-aluminum').value = itemData.aluminum || '';
                    newItem.querySelector('.item-hardware').value = itemData.hardware || '';
                    newItem.querySelector('.item-quantity').value = itemData.quantity || 1;
                    newItem.querySelector('.item-total-price').value = itemData.total_price || '0.00';
                }

                newItem.querySelector('.remove-item').addEventListener('click', () => {
                    newItem.remove();
                    updateTotal();
                });

                newItem.querySelectorAll('input').forEach(input => {
                    if (input.classList.contains('item-total-price') || input.classList.contains('item-quantity')) {
                        input.addEventListener('input', updateTotal);
                    }
                });
            };

            const setDateValue = (elementId, dateString) => {
                const element = document.getElementById(elementId);
                if (!dateString) {
                    element.value = '';
                    return;
                }
                // A data do banco já vem no formato YYYY-MM-DDTHH:mm:ss.sssZ
                // Apenas pegamos a parte da data.
                element.value = dateString.split('T')[0];
            };

            const loadQuoteForEdit = async (id) => {
                try {
                    const response = await fetch(`/api/orcamentos/${id}`);
                    if (!response.ok) {
                        throw new Error('Orçamento não encontrado.');
                    }
                    const data = await response.json();

                    // Preenche os dados do cliente
                    document.getElementById('clientName').value = data.client.name;
                    document.getElementById('clientAddress').value = data.client.address;
                    document.getElementById('clientPhone').value = data.client.phone;

                    // Preenche os detalhes do orçamento
                    document.getElementById('quoteNumber').value = data.quote_number;
                    setDateValue('quoteDate', data.date);
                    setDateValue('deliveryDate', data.delivery_date);
                    setDateValue('validUntil', data.valid_until);
                    
                    // Limpa o item inicial e adiciona os itens do orçamento
                    itemsContainer.innerHTML = '';
                    if (data.items && data.items.length > 0) {
                        for (const item of data.items) {
                            await addItem(item);
                        }
                    } else {
                        // Se não houver itens, adiciona um em branco
                        await addItem();
                    }

                    updateTotal();

                } catch (error) {
                    console.error('Erro ao carregar orçamento:', error);
                    alert('Não foi possível carregar os dados do orçamento. Redirecionando para a página inicial.');
                    window.location.href = '/index.html';
                }
            };

            if (quoteId) {
                editMode = true;
                pageTitle.textContent = 'Editar Orçamento';
                submitBtn.textContent = 'Salvar Alterações';
                await loadQuoteForEdit(quoteId);
            } else {
                // Modo de criação: define a data de hoje e adiciona um item inicial
                const today = new Date();
                document.getElementById('quoteDate').value = today.toISOString().split('T')[0];
                await addItem();
            }

            addItemBtn.addEventListener('click', () => addItem());

            quoteForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                submitBtn.disabled = true;
                submitBtn.textContent = 'Salvando...';

                const quoteData = {
                    client: {
                        name: document.getElementById('clientName').value,
                        address: document.getElementById('clientAddress').value,
                        phone: document.getElementById('clientPhone').value,
                    },
                    quote_number: document.getElementById('quoteNumber').value,
                    date: document.getElementById('quoteDate').value,
                    delivery_date: document.getElementById('deliveryDate').value,
                    valid_until: document.getElementById('validUntil').value,
                    total: document.getElementById('total').value,
                    items: Array.from(document.querySelectorAll('.item')).map(item => ({
                        image_filename: item.querySelector('.item-image').value,
                        title: item.querySelector('.item-title').value,
                        width: item.querySelector('.item-width').value,
                        height: item.querySelector('.item-height').value,
                        glass: item.querySelector('.item-glass').value,
                        aluminum: item.querySelector('.item-aluminum').value,
                        hardware: item.querySelector('.item-hardware').value,
                        quantity: item.querySelector('.item-quantity').value,
                        total_price: item.querySelector('.item-total-price').value,
                    }))
                };

                try {
                    let response;
                    if (editMode) {
                        // MODO DE EDIÇÃO
                        response = await fetch(`/api/orcamentos/${quoteId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(quoteData),
                        });
                        if (response.ok) {
                            alert('Orçamento atualizado com sucesso!');
                            window.location.href = '/lista.html';
                        } else {
                            const error = await response.json();
                            throw new Error(error.error || 'Erro ao atualizar orçamento.');
                        }
                    } else {
                        // MODO DE CRIAÇÃO
                        quoteData.company = {
                            name: 'VERSAILLERS ESQUADRIAS',
                            address: 'Avenida Joaquim Ribeiro, 1299, Teresina',
                            cnpj: '57.077.012/0001-31',
                            email: 'versailles.esquadrias@gmail.com',
                            cell: '(11) 99597-1050',
                        };
                        response = await fetch('/quotes', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(quoteData),
                        });

                        if (response.ok) {
                            const blob = await response.blob();
                            const url = window.URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.style.display = 'none';
                            a.href = url;
                            a.download = `orcamento-${quoteData.quote_number}.pdf`;
                            document.body.appendChild(a);
                            a.click();
                            window.URL.revokeObjectURL(url);
                            // Opcional: redirecionar ou limpar o formulário após sucesso
                            window.location.href = '/lista.html';
                        } else {
                            const errorText = await response.text();
                            throw new Error(`Erro ao gerar PDF: ${errorText}`);
                        }
                    }
                } catch (error) {
                    console.error('Erro ao enviar formulário:', error);
                    alert(`Erro: ${error.message}`);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = editMode ? 'Salvar Alterações' : 'Gerar PDF';
                }
            });
        });
    </script>
</body>
</html>
